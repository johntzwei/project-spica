<svg xmlns="http://www.w3.org/2000/svg" viewBox="52 27 88 88" role="img" aria-label="Project Spica">
  <!-- Favicon: the four-star "box" of the Virgo mark, arms removed for legibility at small sizes. -->
  <style>
    :root { color: #14161f; }
    @media (prefers-color-scheme: dark) { :root { color: #e8ecf6; } }
  </style>
  <g fill="currentColor" stroke="currentColor">
    <!-- The box: the closed quadrilateral Spica -> (73.8,49.8) -> (112.2,33.8) -> (125.8,53.2). -->
    <path d="M 83.1 92.1 L 73.8 49.8 L 112.2 33.8 L 125.8 53.2 Z"
          fill="none" stroke-width="1.6" stroke-linejoin="round" opacity="0.55"/>
    <circle cx="73.8" cy="49.8" r="3"/>
    <circle cx="112.2" cy="33.8" r="3"/>
    <circle cx="125.8" cy="53.2" r="3"/>
    <!-- Spica: the brand star, enlarged, with halo and diffraction spikes. -->
    <circle cx="83.1" cy="92.1" r="13" opacity="0.12"/>
    <path d="M 63.1 92.1 L 83.1 90.1 L 103.1 92.1 L 83.1 94.1 Z" opacity="0.6"/>
    <path d="M 83.1 72.1 L 81.1 92.1 L 83.1 112.1 L 85.1 92.1 Z" opacity="0.6"/>
    <circle cx="83.1" cy="92.1" r="7"/>
  </g>
</svg>
